<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intellix — Social</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06070d;--bg2:#0d0f1a;--bg3:#12152a;--card:#161a2e;--card2:#1c2040;
  --border:#ffffff10;--border2:#ffffff1c;--border3:#ffffff28;
  --text:#e8eaf6;--text2:#7b82b0;--text3:#3a4060;
  --cyan:#00e5ff;--cyan2:#00b8d9;--purple:#9c6fff;--purple2:#7c4fff;
  --green:#00e676;--red:#ff1744;--orange:#ff9100;--gold:#ffd740;--pink:#ff4081;
  --font:'Syne',sans-serif;--body:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:13px;overflow:hidden}

/* ── GRID BG ── */
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;z-index:0}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(6,7,13,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;z-index:1000}
.tb-logo{display:flex;align-items:center;gap:9px;cursor:pointer;text-decoration:none}
.tb-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:13px;font-weight:800;color:#000}
.tb-name{font-family:var(--font);font-size:17px;font-weight:800;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tb-sep{width:1px;height:24px;background:var(--border2)}
.tb-section{display:flex;align-items:center;gap:6px;font-family:var(--font);font-size:13px;font-weight:700;color:var(--pink)}
.tb-heart{font-size:14px}
.tb-space{flex:1}
.tb-live{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:16px;background:var(--card);border:1px solid var(--border2);font-size:11px;color:var(--text2)}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.4)}50%{box-shadow:0 0 0 5px rgba(0,230,118,0)}}
.tb-btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--body);transition:all .15s}
.tb-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.tb-ghost:hover{border-color:var(--pink);color:var(--pink)}
.tb-primary{background:linear-gradient(135deg,var(--pink),var(--purple2));color:#fff}
.tb-primary:hover{opacity:.9}

/* ── TOAST ── */
#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card2);border-radius:10px;padding:11px 16px;font-size:12px;color:var(--text);pointer-events:auto;cursor:pointer;min-width:220px;opacity:0;transition:opacity .3s;border-left:3px solid var(--cyan)}
.toast.show{opacity:1}
.toast.success{border-left-color:var(--green)}
.toast.error{border-left-color:var(--red)}
.toast.warning{border-left-color:var(--orange)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(6,7,13,.88);z-index:5000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-family:var(--font);font-size:15px;font-weight:800}
.modal-x{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text2)}
.modal-x:hover{color:var(--text)}
.modal-body{padding:18px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--bg2);position:sticky;bottom:0}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--body);transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-primary{background:linear-gradient(135deg,var(--cyan2),var(--purple2));color:#000}
.btn-primary:hover{opacity:.9}
.btn-pink{background:linear-gradient(135deg,var(--pink),var(--purple2));color:#fff}
.btn-pink:hover{opacity:.9}
.ix-input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:9px;padding:10px 14px;color:var(--text);font-size:13px;font-family:var(--body);outline:none;transition:border-color .2s;margin-bottom:10px}
.ix-input:focus{border-color:var(--cyan)}
.ix-input::placeholder{color:var(--text3)}

/* ── LAYOUT ── */
.social-shell{display:grid;grid-template-columns:280px 1fr 300px;height:calc(100vh - 60px);margin-top:60px;position:relative;z-index:1}

/* ── LEFT: FRIENDS ── */
.s-left{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.s-left-hdr{padding:16px 14px 10px;border-bottom:1px solid var(--border)}
.s-left-title{font-family:var(--font);font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:7px;color:var(--pink)}
.s-search{position:relative}
.s-search input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:9px;padding:8px 14px 8px 32px;color:var(--text);font-size:12px;font-family:var(--body);outline:none;transition:border-color .2s}
.s-search input:focus{border-color:var(--cyan)}
.s-search input::placeholder{color:var(--text3)}
.s-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3)}
.ftabs{display:flex;border-bottom:1px solid var(--border)}
.ftab{flex:1;padding:9px 5px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s}
.ftab.active{color:var(--pink);border-bottom-color:var(--pink);background:rgba(255,64,129,.04)}
.ftab:hover:not(.active){color:var(--text2)}
.friends-list{flex:1;overflow-y:auto;padding:6px 6px}
.friends-list::-webkit-scrollbar{width:3px}.friends-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.fi{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:all .12s;margin-bottom:2px}
.fi:hover{background:var(--card)}
.fi.active{background:linear-gradient(90deg,rgba(255,64,129,.1),transparent);border-left:2px solid var(--pink)}
.fi-av{position:relative;flex-shrink:0}
.fi-av-img{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000}
.fi-dot{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg2)}
.st-online{background:var(--green)}
.st-away{background:var(--orange)}
.st-offline{background:var(--text3)}
.fi-info{flex:1;min-width:0}
.fi-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-last{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.fi-time{font-size:10px;color:var(--text3);font-family:var(--mono)}
.fi-badge{background:var(--pink);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px;min-width:16px;text-align:center}
.req-actions{display:flex;gap:5px;margin-top:5px}
.freq-accept{padding:4px 10px;border-radius:7px;border:none;background:rgba(0,230,118,.15);color:var(--green);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}
.freq-accept:hover{background:rgba(0,230,118,.25)}
.freq-decline{padding:4px 10px;border-radius:7px;border:none;background:var(--bg3);color:var(--text3);font-size:11px;font-weight:600;cursor:pointer}
.freq-decline:hover{background:var(--card2);color:var(--text2)}
.add-friend-wrap{padding:10px 12px;border-top:1px solid var(--border)}
.add-btn{width:100%;padding:9px;border-radius:9px;background:linear-gradient(135deg,rgba(255,64,129,.15),rgba(156,111,255,.15));border:1px solid rgba(255,64,129,.3);color:var(--pink);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.add-btn:hover{background:linear-gradient(135deg,rgba(255,64,129,.25),rgba(156,111,255,.25))}

/* ── CENTER: CHAT ── */
.s-center{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.chat-hdr{display:flex;align-items:center;gap:11px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.chat-hdr-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;position:relative;flex-shrink:0}
.chat-hdr-name{font-family:var(--font);font-size:14px;font-weight:800}
.chat-hdr-sub{font-size:11px;color:var(--text3);margin-top:1px}
.chat-hdr-btns{margin-left:auto;display:flex;gap:6px}
.hdr-btn{width:30px;height:30px;border-radius:8px;background:var(--card);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.hdr-btn:hover{border-color:var(--pink);color:var(--pink)}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3)}
.chat-empty-icon{font-size:44px;opacity:.35}
.chat-empty-title{font-family:var(--font);font-size:15px;font-weight:700;color:var(--text2)}
.chat-empty-sub{font-size:12px;text-align:center;max-width:240px;line-height:1.7}
.chat-msgs{flex:1;overflow-y:auto;padding:18px 18px;display:flex;flex-direction:column;gap:11px}
.chat-msgs::-webkit-scrollbar{width:4px}.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg-wrap{display:flex;gap:7px;align-items:flex-end;max-width:72%}
.msg-wrap.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000;flex-shrink:0}
.msg-bubble{padding:9px 13px;border-radius:16px;font-size:12px;line-height:1.55;word-break:break-word}
.msg-wrap:not(.mine) .msg-bubble{background:var(--card2);border:1px solid var(--border);border-radius:4px 16px 16px 16px;color:var(--text)}
.msg-wrap.mine .msg-bubble{background:linear-gradient(135deg,var(--pink),var(--purple2));color:#fff;border-radius:16px 4px 16px 16px}
.msg-time{font-size:9px;color:var(--text3);margin-top:4px;font-family:var(--mono)}
.msg-wrap.mine .msg-time{text-align:right}
.pay-bubble{background:var(--card);border:1px solid rgba(0,229,255,.25);border-radius:13px;padding:13px 15px;min-width:200px}
.pay-bubble-hdr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.pay-bubble-icon{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--cyan2),var(--purple2));display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;color:#000}
.pay-bubble-title{font-size:11px;font-weight:700;font-family:var(--font)}
.pay-bubble-sub{font-size:10px;color:var(--text3)}
.pay-bubble-amount{font-family:var(--font);font-size:20px;font-weight:800;color:var(--cyan);margin-bottom:5px}
.pay-bubble-note{font-size:11px;color:var(--text2);margin-bottom:9px}
.pay-bubble-btns{display:flex;gap:6px}
.pay-now-btn{flex:1;padding:7px;border-radius:8px;background:linear-gradient(135deg,var(--cyan2),var(--purple2));border:none;color:#000;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.pay-now-btn:hover{opacity:.9}
.pay-decline-btn{flex:1;padding:7px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.pay-decline-btn:hover{border-color:var(--red);color:var(--red)}
.pay-status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:8px;font-size:10px;font-weight:700}
.badge-paid{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.2)}
.badge-pending{background:rgba(255,145,0,.1);color:var(--orange);border:1px solid rgba(255,145,0,.2)}
.badge-declined{background:rgba(255,23,68,.1);color:var(--red);border:1px solid rgba(255,23,68,.2)}
.typing-wrap{padding:0 18px 6px;display:none}
.typing-inner{display:flex;align-items:center;gap:7px}
.typing-dots{display:flex;gap:3px}
.t-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:tBounce 1.2s infinite}
.t-dot:nth-child(2){animation-delay:.2s}.t-dot:nth-child(3){animation-delay:.4s}
@keyframes tBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.chat-input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.emoji-bar{display:flex;gap:8px;padding:0 2px 8px;font-size:15px}
.emoji-btn{cursor:pointer;padding:2px 4px;border-radius:5px;transition:background .15s}
.emoji-btn:hover{background:var(--card2)}
.input-row{display:flex;align-items:flex-end;gap:8px}
.input-tools{display:flex;gap:5px}
.input-tool{width:32px;height:32px;border-radius:8px;background:var(--card);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text2);transition:all .15s}
.input-tool:hover{border-color:var(--pink);color:var(--pink)}
.chat-textarea{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:9px 13px;color:var(--text);font-size:13px;font-family:var(--body);outline:none;transition:border-color .2s;resize:none;max-height:110px;min-height:40px;line-height:1.5}
.chat-textarea:focus{border-color:var(--pink)}
.chat-textarea::placeholder{color:var(--text3)}
.send-btn{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--pink),var(--purple2));border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:#fff;transition:all .15s;flex-shrink:0}
.send-btn:hover{opacity:.9;transform:scale(1.05)}

/* ── RIGHT: PROFILE + SEND MONEY ── */
.s-right{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.s-right::-webkit-scrollbar{width:3px}.s-right::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.right-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:28px;color:var(--text3);text-align:center}
.right-empty-icon{font-size:38px;opacity:.3}
.profile-card{padding:18px 16px;border-bottom:1px solid var(--border);text-align:center}
.profile-av{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#000;margin:0 auto 10px;position:relative}
.profile-av-ring{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--pink);animation:ringPulse 2.5s ease-in-out infinite}
@keyframes ringPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.06)}}
.profile-name{font-family:var(--font);font-size:14px;font-weight:800;margin-bottom:2px}
.profile-handle{font-size:11px;color:var(--text3);font-family:var(--mono)}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);margin-top:11px;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.ps{padding:9px 4px;text-align:center;border-right:1px solid var(--border);background:var(--bg3)}
.ps:last-child{border-right:none}
.ps-val{font-family:var(--font);font-size:13px;font-weight:800}
.ps-lbl{font-size:9px;color:var(--text3);margin-top:1px;text-transform:uppercase;letter-spacing:.5px}
.profile-badges{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:9px}
.p-badge{padding:2px 8px;border-radius:7px;font-size:10px;font-weight:700}
.send-panel{padding:14px 16px;border-bottom:1px solid var(--border)}
.sp-title{font-family:var(--font);font-size:12px;font-weight:800;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.sp-amt{font-family:var(--mono);font-size:28px;font-weight:800;color:var(--cyan);border:none;background:transparent;width:100%;outline:none;padding:4px 0 7px;border-bottom:1px solid var(--border);margin-bottom:11px}
.sp-amt::placeholder{color:var(--text3)}
.sp-curs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.sp-cur{padding:4px 10px;border-radius:13px;border:1px solid var(--border2);background:var(--bg3);font-size:10px;font-family:var(--mono);font-weight:600;cursor:pointer;transition:all .15s;color:var(--text2)}
.sp-cur.active{background:rgba(0,229,255,.1);border-color:var(--cyan);color:var(--cyan)}
.sp-types{display:flex;gap:5px;margin-bottom:10px}
.sp-type{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);font-size:10px;font-weight:600;text-align:center;cursor:pointer;transition:all .15s;color:var(--text2)}
.sp-type.active{background:rgba(255,64,129,.1);border-color:var(--pink);color:var(--pink)}
.sp-note{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:8px 11px;color:var(--text);font-size:12px;font-family:var(--body);outline:none;transition:border-color .2s;margin-bottom:10px}
.sp-note:focus{border-color:var(--pink)}
.sp-note::placeholder{color:var(--text3)}
.sp-fee{font-size:10px;color:var(--text3);background:var(--bg3);border-radius:7px;padding:6px 10px;margin-bottom:10px;line-height:1.6}
.sp-send{width:100%;padding:10px;border-radius:9px;background:linear-gradient(135deg,var(--cyan2),var(--purple2));border:none;color:#000;font-size:12px;font-weight:800;cursor:pointer;font-family:var(--font);transition:all .2s;margin-bottom:6px}
.sp-send:hover{opacity:.9;transform:translateY(-1px)}
.sp-req{width:100%;padding:10px;border-radius:9px;background:transparent;border:1px solid rgba(255,64,129,.3);color:var(--pink);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .2s}
.sp-req:hover{background:rgba(255,64,129,.08)}
.recent-txns{padding:12px 16px}
.rt-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:9px}
.rtxn{display:flex;align-items:center;gap:7px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px}
.rtxn:last-child{border-bottom:none}
.rtxn-ico{font-size:15px;width:24px;text-align:center}
.rtxn-info{flex:1}
.rtxn-name{font-weight:600}
.rtxn-sub{font-size:10px;color:var(--text3);margin-top:1px}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div id="toast-wrap"></div>

<!-- TOPBAR -->
<div class="topbar">
  <a class="tb-logo" href="#">
    <div class="tb-mark">IX</div>
    <div class="tb-name">Intellix</div>
  </a>
  <div class="tb-sep"></div>
  <div class="tb-section">
    <span class="tb-heart">&#9829;</span> Social
  </div>
  <div class="tb-space"></div>
  <div class="tb-live"><span class="ldot"></span><span id="liveCount">4 online</span></div>
  <button class="tb-btn tb-ghost" onclick="openAddFriend()">&#43; Add Friend</button>
  <button class="tb-btn tb-primary">Sign in</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle">Modal</div>
      <div class="modal-x" onclick="closeModal()">&#10005;</div>
    </div>

// ── TOAST ──
function toast(msg, type='info', dur=3000){
  const c=document.getElementById('toast-wrap');
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  const colors={info:'var(--cyan)',success:'var(--green)',error:'var(--red)',warning:'var(--orange)'};
  t.innerHTML=`<span style="color:${colors[type]||colors.info};margin-right:6px">&#9670;</span>${msg}`;
  t.onclick=()=>t.remove();
  c.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},dur);
}

    msgs.innerHTML=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);padding:40px 0">

    </div>`;
    return;
  }
  msgs.innerHTML=history.map(m=>{
    const isMe=m.from==='me';
    if(m.type==='payment_sent'||m.type==='payment_request'){
      const pr=m.payReq;
      const isPending=m.type==='payment_request'&&!isMe&&pr.status==='pending';
      return `<div class="msg-wrap${isMe?' mine':''}">

              </div>
            </div>
            <div class="pay-bubble-amount">${pr.currency==='USD'?'$':''}${pr.amount} ${pr.currency}</div>
            <div class="pay-bubble-note">${pr.note}</div>
            ${isPending
              ?`<div class="pay-bubble-btns">
                  <button class="pay-now-btn" onclick="acceptPayReq(${pr.amount},'${pr.currency}','${pr.note}',this.closest('.pay-bubble'))">Pay now &#9670;</button>
                  <button class="pay-decline-btn" onclick="declinePayReq(this.closest('.pay-bubble'))">Decline</button>
                </div>`
              :`<span class="pay-status-badge ${pr.status==='sent'?'badge-paid':'badge-pending'}">${pr.status==='sent'?'&#10003; Paid':'&#9680; Pending'}</span>`}
          </div>
          <div class="msg-time">${m.time}</div>
        </div>
        ${isMe?`<div class="msg-av" style="background:linear-gradient(135deg,var(--pink),var(--purple2));font-size:8px">You</div>`:''}

    }
    return `<div class="msg-wrap${isMe?' mine':''}">
      ${!isMe?`<div class="msg-av" style="background:${f.color};font-size:9px">${f.init}</div>`:''}

        <div class="msg-time">${m.time}</div>

  msgs.scrollTop=msgs.scrollHeight;
}

    const hist=CHAT_HISTORY[f.id]||(CHAT_HISTORY[f.id]=[]);
    hist.push({from:'them',text:reply,time:'Just now',type:'text'});
    f.lastMsg=reply;f.lastTime='Just now';
    renderMessages(f);renderFriendsList();
  },2200);
}

function setModalCur(cur,el){_modalCur=cur;document.querySelectorAll('#modalCurPills>div').forEach(d=>{d.style.border='1px solid var(--border2)';d.style.background='var(--bg3)';d.style.color='var(--text2)';});el.style.border='1px solid var(--pink)';el.style.background='rgba(255,64,129,.1)';el.style.color='var(--pink)';calcModalFee();}
function calcModalFee(){const amt=parseFloat(document.getElementById('modalPayAmt')?.value)||0;const box=document.getElementById('modalFeeBox');if(box&&amt>0){const ix=(amt*0.0005).toFixed(2);box.innerHTML=`Network: $0.18 &nbsp;·&nbsp; Intellix: $${ix} &nbsp;·&nbsp; Total: $${(amt+0.18+parseFloat(ix)).toFixed(2)} &nbsp;·&nbsp; ETA: 14s`;}}
function confirmSendMoney(){
  const amt=parseFloat(document.getElementById('modalPayAmt')?.value)||0;
  const note=(document.getElementById('modalPayNote')?.value)||'';
  if(!amt||amt<=0){toast('Enter a valid amount','error');return;}
  const f=FRIENDS_DATA.find(x=>x.id===activeFriendId);if(!f)return;
  closeModal();
  const hist=CHAT_HISTORY[activeFriendId]||(CHAT_HISTORY[activeFriendId]=[]);
  hist.push({from:'me',payReq:{amount:amt,currency:_modalCur,note:note||'Payment via Intellix',status:'sent'},time:'Just now',type:'payment_sent'});
  f.lastMsg=`💸 Sent ${_modalCur==='USD'?'$':''}${amt} ${_modalCur}`;f.lastTime='Just now';

  toast(`$${amt} ${_modalCur} sent to ${f.name}!`,'success',3000);
}
function openRequestMoney(){
  const f=FRIENDS_DATA.find(x=>x.id===activeFriendId);if(!f){toast('Select a friend first','warning');return;}
  openModal(`&#8645; Request from ${f.name}`,
    `<div style="text-align:center;margin-bottom:14px">
      <div style="width:48px;height:48px;border-radius:50%;background:${f.color};margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#000">${f.init}</div>
      <div style="font-family:var(--font);font-size:14px;font-weight:800">${f.name}</div>
    </div>
    <input id="modalReqAmt" type="number" placeholder="Amount to request" class="ix-input" style="font-size:20px;color:var(--purple);font-family:var(--mono);font-weight:700">
    <input id="modalReqNote" placeholder="What's it for?" class="ix-input">`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-pink" onclick="confirmRequestMoney()">Send Request</button>`
  );
}
function confirmRequestMoney(){
  const amt=parseFloat(document.getElementById('modalReqAmt')?.value)||0;
  const note=(document.getElementById('modalReqNote')?.value)||'';
  if(!amt||amt<=0){toast('Enter a valid amount','error');return;}
  const f=FRIENDS_DATA.find(x=>x.id===activeFriendId);if(!f)return;
  closeModal();
  const hist=CHAT_HISTORY[activeFriendId]||(CHAT_HISTORY[activeFriendId]=[]);
  hist.push({from:'me',payReq:{amount:amt,currency:'USD',note:note||'Payment request',status:'pending'},time:'Just now',type:'payment_request'});
  f.lastMsg=`💸 Requested $${amt}`;f.lastTime='Just now';
  renderMessages(f);renderFriendsList();
  toast(`Payment request sent to ${f.name}`,'info',2500);
}
function acceptPayReq(amount,currency,note,bubble){
  bubble.querySelector('.pay-bubble-btns').remove();
  const badge=document.createElement('span');
  badge.className='pay-status-badge badge-paid';
  badge.innerHTML='&#10003; Paid';
  bubble.querySelector('.pay-bubble-note').after(badge);
  toast(`$${amount} ${currency} paid!`,'success',3000);
}
function declinePayReq(bubble){
  const btns=bubble.querySelector('.pay-bubble-btns');if(btns)btns.remove();
  const badge=document.createElement('span');
  badge.className='pay-status-badge badge-declined';
  badge.innerHTML='Declined';
  bubble.querySelector('.pay-bubble-note').after(badge);
  toast('Payment request declined','info',1500);
}

// ── FRIEND REQUESTS ──
function acceptFriendReq(id,name){
  const idx=FRIEND_REQUESTS.findIndex(r=>r.id===id);if(idx>-1)FRIEND_REQUESTS.splice(idx,1);
  const b=document.getElementById('reqBadge');if(b)b.textContent=FRIEND_REQUESTS.length||'';
  renderFriendsList();toast(`${name} added to your friends!`,'success');
}
function declineFriendReq(id){
  const idx=FRIEND_REQUESTS.findIndex(r=>r.id===id);if(idx>-1)FRIEND_REQUESTS.splice(idx,1);
  renderFriendsList();toast('Friend request declined','info',1500);
}

// ── ADD FRIEND ──
function openAddFriend(){
  openModal('&#43; Add Friend',
    `<div style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6">Search by name, handle, email or Intellix ID.</div>
    <input id="addFriendInput" placeholder="@handle, name or email..." class="ix-input" oninput="searchAddFriend(this.value)">
    <div id="addFriendResults" style="display:flex;flex-direction:column;gap:8px"></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Close</button>`
  );
}
function searchAddFriend(q){
  const res=document.getElementById('addFriendResults');if(!q.trim()){res.innerHTML='';return;}
  const suggestions=[
    {name:'Jordan Lee',handle:'@jordan.lee',init:'JL',color:'linear-gradient(135deg,#00e5ff,#9c6fff)'},
    {name:'River Chen',handle:'@river.c',init:'RC',color:'linear-gradient(135deg,#ffd740,#ff9100)'},
    {name:'Taylor Park',handle:'@taylor.p',init:'TP',color:'linear-gradient(135deg,#00e676,#00b8d9)'},
  ].filter(s=>s.name.toLowerCase().includes(q.toLowerCase())||s.handle.includes(q.toLowerCase()));
  res.innerHTML=suggestions.length
    ?suggestions.map(s=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:10px">
        <div style="width:34px;height:34px;border-radius:50%;background:${s.color};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000">${s.init}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:600">${s.name}</div><div style="font-size:11px;color:var(--text3)">${s.handle}</div></div>
        <button onclick="toast('Friend request sent to ${s.name}!','success');this.textContent='Sent ✓';this.disabled=true;this.style.opacity='.5'" style="padding:6px 14px;border-radius:8px;background:linear-gradient(135deg,var(--pink),var(--purple2));border:none;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)">Add</button>
      </div>`).join('')
    :`<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">No users found for "${q}"</div>`;
}

// ── RIGHT PROFILE ──
function renderRightProfile(f){
  const rEmpty=document.getElementById('rightEmpty');
  const rProfile=document.getElementById('rightProfile');
  if(rEmpty)rEmpty.style.display='none';
  if(!rProfile)return;
  rProfile.style.display='block';
  rProfile.innerHTML=`
    <div class="profile-card">
      <div class="profile-av" style="background:${f.color}">${f.init}<div class="profile-av-ring"></div></div>
      <div class="profile-name">${f.name}</div>
      <div class="profile-handle">${f.handle}</div>
      <div class="profile-stats">
        <div class="ps"><div class="ps-val text-cyan" style="color:var(--cyan)">47</div><div class="ps-lbl">Txns</div></div>
        <div class="ps"><div class="ps-val text-green" style="color:var(--green)">$${(f.balance/1000).toFixed(0)}K</div><div class="ps-lbl">Sent</div></div>
        <div class="ps"><div class="ps-val" style="color:var(--purple)">12</div><div class="ps-lbl">Friends</div></div>
      </div>
      <div class="profile-badges">
        <span class="p-badge" style="background:rgba(0,229,255,.1);color:var(--cyan)">&#10003; KYC</span>
        <span class="p-badge" style="background:rgba(0,230,118,.1);color:var(--green)">&#9670; Verified</span>
        ${f.status==='online'?'<span class="p-badge" style="background:rgba(0,230,118,.08);color:var(--green)">● Online</span>':''}
      </div>
    </div>
    <div class="send-panel">
      <div class="sp-title">&#9670; Send Money</div>
      <input class="sp-amt" id="smpAmt" type="number" placeholder="0.00" oninput="calcSmpFee()">
      <div class="sp-curs">${['USD','EUR','GBP','BTC','ETH','USDC'].map(c=>`<div class="sp-cur${c==='USD'?' active':''}" onclick="setSmpCur('${c}',this)">${c}</div>`).join('')}</div>
      <div class="sp-types">
        <div class="sp-type active" onclick="setSmpType('send',this)">&#9670; Send</div>
        <div class="sp-type" onclick="setSmpType('request',this)">&#8645; Request</div>
        <div class="sp-type" onclick="setSmpType('split',this)">&#9783; Split</div>
      </div>
      <input id="smpNote" class="sp-note" placeholder="Add a note...">
      <div class="sp-fee" id="smpFeeBox">Enter amount to calculate fees</div>
      <button class="sp-send" onclick="doSmpAction()">&#9670; Send Money</button>
      <button class="sp-req" onclick="openRequestMoney()">&#8645; Request Money</button>
    </div>
    <div class="recent-txns">
      <div class="rt-title">Recent with ${f.name}</div>
      ${(f.txHistory&&f.txHistory.length)
        ?f.txHistory.map(t=>`
          <div class="rtxn">
            <div class="rtxn-ico">${t.dir==='sent'?'&#8599;':'&#8600;'}</div>
            <div class="rtxn-info"><div class="rtxn-name">${t.note}</div><div class="rtxn-sub">${t.time}</div></div>
            <div style="font-size:12px;font-weight:700;font-family:var(--mono);color:${t.dir==='sent'?'var(--red)':'var(--green)'}">${t.dir==='sent'?'-':'+'} ${t.amt}</div>
          </div>`).join('')
        :'<div style="font-size:11px;color:var(--text3);text-align:center;padding:12px 0">No transactions yet</div>'}
    </div>`;
}
function setSmpCur(cur,el){smpCurrency=cur;document.querySelectorAll('.sp-cur').forEach(c=>c.classList.remove('active'));el.classList.add('active');calcSmpFee();}
function setSmpType(type,el){smpType=type;document.querySelectorAll('.sp-type').forEach(t=>t.classList.remove('active'));el.classList.add('active');}
function calcSmpFee(){
  const amt=parseFloat(document.getElementById('smpAmt')?.value)||0;
  const box=document.getElementById('smpFeeBox');if(!box)return;
  if(!amt){box.textContent='Enter amount to calculate fees';return;}
  const ix=(amt*0.0005).toFixed(2);
  box.innerHTML=`Network: $0.18 · Intellix: $${ix} · Total: $${(amt+0.18+parseFloat(ix)).toFixed(2)} · 14s via Polygon`;
}
function doSmpAction(){
  const amt=parseFloat(document.getElementById('smpAmt')?.value)||0;
  const note=(document.getElementById('smpNote')?.value)||'';
  if(!amt||amt<=0){toast('Enter a valid amount','error');return;}
  const f=FRIENDS_DATA.find(x=>x.id===activeFriendId);if(!f)return;
  if(smpType==='send'){
    const hist=CHAT_HISTORY[activeFriendId]||(CHAT_HISTORY[activeFriendId]=[]);
    hist.push({from:'me',payReq:{amount:amt,currency:smpCurrency,note:note||'Payment via Intellix',status:'sent'},time:'Just now',type:'payment_sent'});
    f.lastMsg=`💸 Sent $${amt}`;f.lastTime='Just now';
    renderMessages(f);renderFriendsList();
    document.getElementById('smpAmt').value='';
    toast(`$${amt} ${smpCurrency} sent to ${f.name}!`,'success',3000);
  } else if(smpType==='request'){
    openRequestMoney();
  } else {
    toast('Split bill — enter amounts for each friend','info',2500);
  }
}

// ── START ──
init();
</script>
</body>
</html>
